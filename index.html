<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資訊與即時時間 - 林建璋</title>
    <meta name="description" content="林建璋的個人首頁，展示即時更新的日期與時間，搭配現代極簡的毛玻璃設計風格。">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient-1: #0b0914;
            --bg-gradient-2: #141026;
            --bg-gradient-3: #08060f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-glow: rgba(138, 75, 243, 0.4);
            --accent-color-1: #a855f7;
            --accent-color-2: #ec4899;
            --accent-color-3: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-gradient-1);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-glow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-glow-ball {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            mix-blend-mode: screen;
            animation: float 20s infinite alternate ease-in-out;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-color-1) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .glow-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-color-2) 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .glow-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-color-3) 0%, transparent 70%);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                transform: translate(80px, 50px) scale(1.15) rotate(360deg);
            }
        }

        /* Main Container Card */
        main {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 580px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        main:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        0 0 40px var(--accent-glow),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Content Layout */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        /* Text Styles */
        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            line-height: 1.3;
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }

        .greeting {
            color: var(--text-secondary);
            font-weight: 300;
        }

        .name {
            display: block;
            font-size: 3.2rem;
            font-weight: 900;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #c084fc 0%, #f472b6 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            position: relative;
        }

        /* Clock Components */
        .time-display-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 2rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .time-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: block;
        }

        .clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .clock span {
            display: inline-block;
        }

        .clock .colon {
            animation: blink 1s infinite;
            padding: 0 2px;
            color: var(--accent-color-1);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .date-display {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .timezone-tag {
            font-size: 0.75rem;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-left: 4px;
        }

        /* Footer info */
        footer {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            main {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .name {
                font-size: 2.6rem;
            }
            .clock {
                font-size: 2.4rem;
            }
            .date-display {
                font-size: 0.95rem;
                flex-direction: column;
                gap: 4px;
            }
            .timezone-tag {
                margin-left: 0;
                margin-top: 4px;
                display: inline-block;
                width: max-content;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic background glow elements -->
    <div class="bg-glow-container">
        <div class="bg-glow-ball glow-1"></div>
        <div class="bg-glow-ball glow-2"></div>
        <div class="bg-glow-ball glow-3"></div>
    </div>

    <!-- Main Content Card -->
    <main>
        <div class="badge" id="live-badge">
            <span class="status-dot"></span>
            <span>Live System</span>
        </div>

        <h1>
            <span class="greeting">Hello, my name is</span>
            <span class="name">林建璋</span>
        </h1>

        <div class="time-display-container">
            <span class="time-label">Current Date & Time</span>
            <div class="clock" id="clock" aria-live="polite">
                <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span>
            </div>
            <div class="date-display">
                <span id="date-text">載入中...</span>
                <span class="timezone-tag" id="timezone-text">UTC+8</span>
            </div>
        </div>

        <footer>
            Designed with Premium Aesthetics &bull; <span id="year">2026</span>
        </footer>
    </main>

    <script>
        function updateDateTime() {
            const now = new Date();
            
            // Format hours, minutes, seconds with leading zeros
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Update Clock DOM elements separately to keep formatting intact
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            
            // Format Date nicely in Traditional Chinese (Taiwan locale)
            const dateOptions = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                weekday: 'long' 
            };
            const dateStr = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('date-text').textContent = dateStr;
            
            // Get Timezone Offset (e.g. GMT+8)
            const timezoneOffset = -now.getTimezoneOffset() / 60;
            const timezoneSign = timezoneOffset >= 0 ? '+' : '';
            document.getElementById('timezone-text').textContent = `GMT${timezoneSign}${timezoneOffset}`;
            
            // Update footer year dynamically
            document.getElementById('year').textContent = now.getFullYear();
        }

        // Initialize clock immediately
        updateDateTime();
        
        // Update every 1000ms (1 second)
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
